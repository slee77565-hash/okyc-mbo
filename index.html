<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OKYC 2026 MBO Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-primary:#ffffff;--bg-secondary:#f8f9fa;--bg-tertiary:#f1f3f5;
  --text-primary:#212529;--text-secondary:#6c757d;--text-hint:#adb5bd;
  --border:#dee2e6;--border-light:#e9ecef;
  --radius:8px;--radius-lg:12px;
  --navy:#1F3864;--blue:#2E75B6;--green:#1B873F;--amber:#D97706;--red:#DC2626;
}
body{font-family:'Malgun Gothic','맑은 고딕','Segoe UI',sans-serif;background:var(--bg-tertiary);color:var(--text-primary);font-size:14px;line-height:1.5}
.app{min-height:100vh;padding-bottom:40px}
.hdr{background:var(--navy);padding:14px 22px 0;color:#fff;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.25)}
.htop{display:flex;justify-content:space-between;align-items:center;margin-bottom:13px;flex-wrap:wrap;gap:8px}
.htitle{font-size:17px;font-weight:600}
.hsub{font-size:11px;color:rgba(255,255,255,.5);margin-top:2px}
.hbadges{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.badge{font-size:11px;padding:4px 10px;border-radius:4px}
.badge-white{background:rgba(255,255,255,.15);color:rgba(255,255,255,.9)}
.badge-green{background:rgba(71,173,144,.25);color:#7ee8c8}
.lang-toggle{display:flex;align-items:center;background:rgba(255,255,255,.12);border-radius:20px;padding:3px;gap:2px;border:none;cursor:default}
.lang-btn{padding:5px 14px;border-radius:16px;font-size:12px;font-weight:600;cursor:pointer;border:none;background:transparent;color:rgba(255,255,255,.65);transition:all .2s;letter-spacing:.02em}
.lang-btn.on{background:#fff;color:var(--navy)}
.hsave-btn{display:inline-flex;align-items:center;gap:5px;height:32px;padding:0 16px;border-radius:7px;border:none;background:#fff;color:var(--navy);font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;box-shadow:0 1px 3px rgba(0,0,0,.12)}
.hsave-btn:hover{background:#f0f4ff;transform:translateY(-1px);box-shadow:0 2px 6px rgba(0,0,0,.18)}
.hsave-btn:active{transform:translateY(0)}
.hsave-btn:disabled{opacity:.6;cursor:wait}
.tabs{display:flex;gap:3px;overflow-x:auto;padding-bottom:0;-webkit-overflow-scrolling:touch}
.tabs::-webkit-scrollbar{height:3px}.tabs::-webkit-scrollbar-thumb{background:rgba(255,255,255,.2)}
.tab{padding:8px 14px;border-radius:6px 6px 0 0;font-size:12px;font-weight:500;cursor:pointer;border:none;background:rgba(255,255,255,.11);color:rgba(255,255,255,.65);white-space:nowrap;transition:all .15s;flex-shrink:0}
.tab:hover{background:rgba(255,255,255,.2);color:#fff}
.tab.on{background:#fff;color:var(--navy)}
.body{padding:16px 20px;max-width:1400px;margin:0 auto}
.hidden{display:none!important}
.krow{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:16px}
@media(max-width:768px){.krow{grid-template-columns:1fr 1fr}}
.kpi{background:var(--bg-primary);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px}
.klbl{font-size:11px;color:var(--text-secondary);margin-bottom:5px}
.kval{font-size:22px;font-weight:600;line-height:1.2}
.ksub{font-size:11px;color:var(--text-secondary);margin-top:3px}
.card{background:var(--bg-primary);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;margin-bottom:14px}
.ct{font-size:13px;font-weight:600;color:var(--text-primary);margin-bottom:14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.grid2{display:grid;grid-template-columns:3fr 2fr;gap:14px;margin-bottom:14px}
.grid11{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
@media(max-width:900px){.grid2,.grid11{grid-template-columns:1fr}}
.gc{display:flex;flex-direction:column;gap:14px}
.grade{display:inline-block;border-radius:4px;font-weight:600;color:#fff;text-align:center}
.gsm{padding:2px 8px;font-size:11px}.gmd{padding:4px 12px;font-size:13px}.glg{padding:6px 18px;font-size:16px}
.spill{display:inline-block;border-radius:4px;font-size:11px;font-weight:600;color:#fff;padding:2px 8px}
.pb{display:flex;align-items:center;gap:8px}
.pbtr{flex:1;background:var(--bg-secondary);border-radius:99px;overflow:hidden;height:10px}
.pbfi{height:100%;border-radius:99px;transition:width .5s ease}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{background:var(--navy);color:#fff;padding:8px 11px;font-weight:600;font-size:11px;text-align:center;white-space:nowrap}
.tbl th:first-child,.tbl th:nth-child(2){text-align:left}
.tbl td{padding:9px 11px;border-bottom:1px solid var(--border-light);color:var(--text-primary);text-align:center;vertical-align:middle}
.tbl td:first-child,.tbl td:nth-child(2){text-align:left}
.tbl tr:hover td{background:var(--bg-secondary);cursor:pointer}
.tbl tr:last-child td{border-bottom:none}
.otag{font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px;display:inline-block}
.qrow{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:4px}
@media(max-width:600px){.qrow{grid-template-columns:1fr 1fr}}
.qcard{border:1px solid var(--border);border-radius:var(--radius);padding:11px 13px;transition:border-color .2s}
.qcard:hover{border-color:var(--blue)}
.qlbl{font-size:10px;font-weight:600;color:var(--text-secondary);margin-bottom:8px;text-transform:uppercase;letter-spacing:.04em}
.qperiod{font-size:9px;color:var(--text-hint);font-weight:400}
.qinp{width:100%;padding:7px 9px;font-size:12px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg-primary);color:var(--text-primary);margin-bottom:6px;transition:border-color .15s}
.qinp:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(46,117,182,.1)}
.qsel{width:100%;padding:6px 8px;font-size:12px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg-primary);color:var(--text-primary);cursor:pointer}
.qsel:focus{outline:none;border-color:var(--blue)}
.qscore-val{text-align:center;padding:6px;font-size:14px;font-weight:600;margin-top:6px;border-radius:var(--radius);background:var(--bg-secondary)}
.icard{border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:12px}
.icard:last-child{margin-bottom:0}
.ihead{display:flex;justify-content:space-between;align-items:center;margin-bottom:13px;flex-wrap:wrap;gap:8px}
.iname{font-size:14px;font-weight:600}
.utag{font-size:10px;font-weight:600;padding:2px 8px;border-radius:4px}
.qscore-row{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:12px}
.qscore-cell{text-align:center;padding:8px 6px;background:var(--bg-secondary);border-radius:var(--radius)}
.qs-lbl{font-size:10px;color:var(--text-secondary);margin-bottom:3px}
.qs-val{font-size:15px;font-weight:600}
.preview-bar{background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 18px;margin-bottom:14px;display:flex;gap:20px;flex-wrap:wrap;align-items:center}
.pv-item{text-align:center}
.pv-val{font-size:20px;font-weight:600}
.pv-lbl{font-size:10px;color:var(--text-secondary);margin-top:3px}
.save-btn{padding:10px 26px;border-radius:var(--radius);font-size:13px;font-weight:600;cursor:pointer;border:none;background:var(--navy);color:#fff;transition:all .15s;display:inline-flex;align-items:center;gap:7px}
.save-btn:hover{background:var(--blue)}
.save-btn:active{transform:scale(.98)}
.lgnd{display:flex;gap:12px;flex-wrap:wrap;margin-top:10px}
.lgit{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text-secondary)}
.lgdot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.rnk{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border-light)}
.rnk:last-child{border-bottom:none}
.sync-chip{display:inline-flex;align-items:center;gap:8px;padding:5px 12px;background:var(--bg-secondary);border:1px solid var(--border-light);border-radius:20px;margin-bottom:14px;font-size:11.5px;color:var(--text-secondary)}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#1B873F;flex-shrink:0;transition:background .2s}
.sync-chip.syncing .sync-dot{animation:syncPulse 1s ease-in-out infinite}
@keyframes syncPulse{0%,100%{opacity:1}50%{opacity:.3}}
.sync-time{color:var(--text-hint);font-size:10.5px;padding-left:6px;border-left:1px solid var(--border)}
.sync-time:empty{display:none;border:none}
.frow{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.fbtn{padding:5px 13px;border-radius:20px;font-size:11px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--bg-primary);color:var(--text-secondary);transition:all .15s}
.fbtn.on{background:var(--navy);color:#fff;border-color:var(--navy)}
.sep{width:1px;background:var(--border);align-self:stretch}
.toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:var(--radius);font-size:13px;font-weight:500;color:#fff;z-index:9999;box-shadow:0 4px 12px rgba(0,0,0,.2);transition:all .3s}
/* 근거자료 (분기별) / 월별 */
.subsec{margin-top:14px;border-top:1px dashed var(--border);padding-top:13px}
.subhead{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:600;color:var(--text-secondary);margin-bottom:10px;flex-wrap:wrap}
.evid-qgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:9px}
@media(max-width:680px){.evid-qgrid{grid-template-columns:1fr}}
.evid-q{display:flex;flex-direction:column}
.evid-q-lbl{font-size:10px;font-weight:600;color:var(--text-secondary);margin-bottom:5px}
.efile-list{display:flex;flex-direction:column;gap:5px;margin-bottom:7px;min-height:20px}
.efile{display:flex;align-items:center;gap:7px;padding:6px 9px;background:var(--bg-secondary);border:1px solid var(--border-light);border-radius:8px}
.efile-ic{font-size:14px;flex-shrink:0}
.efile-nm{flex:1;min-width:0;font-size:11.5px;color:var(--blue);text-decoration:none;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.efile-nm:hover{text-decoration:underline}
.efile-sz{font-size:9.5px;color:var(--text-hint);flex-shrink:0}
.efile-del{flex-shrink:0;width:18px;height:18px;border:none;border-radius:50%;background:transparent;color:var(--text-hint);font-size:14px;line-height:1;cursor:pointer;padding:0}
.efile-del:hover{background:var(--red);color:#fff}
.efile-empty{font-size:10.5px;color:var(--text-hint);padding:7px 9px;text-align:center;border:1px dashed var(--border);border-radius:8px}
.efile-add{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:7px 10px;font-size:11px;font-weight:600;color:var(--navy);background:var(--bg-primary);border:1px dashed var(--blue);border-radius:8px;cursor:pointer;transition:all .15s}
.efile-add:hover{background:#f0f6ff}
.efile-add.uploading{opacity:.6;pointer-events:none;border-style:solid}
.mon-toggle-btn{font-size:11px;padding:4px 11px;border-radius:20px;border:1px solid var(--border);background:var(--bg-primary);color:var(--text-secondary);cursor:pointer}
.mon-toggle-btn.on{background:var(--navy);color:#fff;border-color:var(--navy)}
.mon-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin-top:10px}
@media(max-width:680px){.mon-grid{grid-template-columns:repeat(3,1fr)}}
.mon-cell{border:1px solid var(--border-light);border-radius:var(--radius);padding:6px 7px;background:var(--bg-secondary)}
.mon-lbl{font-size:9px;color:var(--text-secondary);margin-bottom:3px;font-weight:600}
.mon-inp{width:100%;padding:5px 6px;font-size:11px;border:1px solid var(--border);border-radius:5px;background:var(--bg-primary);color:var(--text-primary)}
.mon-inp:focus{outline:none;border-color:var(--blue)}
</style>
</head>
<body>
<div class="app" id="app" style="display:none">
  <div class="hdr">
    <div class="htop">
      <div>
        <div style="font-size:11px;color:rgba(255,255,255,.45);margin-bottom:3px" id="hdrSub">오일허브코리아여수 (OKYC)</div>
        <div class="htitle" id="hdrTitle">2026년 MBO 성과지표 관리 시스템</div>
      </div>
      <div class="hbadges">
        <div class="lang-toggle">
          <button class="lang-btn on" id="btnKO" onclick="setLang('ko')">한국어</button>
          <button class="lang-btn" id="btnEN" onclick="setLang('en')">English</button>
        </div>
        <button class="hsave-btn" id="hdrSaveBtn" onclick="saveAll()">💾 <span id="hdrSaveLbl">저장</span></button>
        <span class="badge badge-white" id="hdrBadge">2026년 연간 관리</span>
        <span class="badge badge-green" id="savedBadge" style="display:none">✓</span>
      </div>
    </div>
    <div class="tabs" id="tabBar"></div>
  </div>
  <div class="body">
    <div id="tab-overview"></div>
    <div id="tab-input" class="hidden"></div>
  </div>
</div>

<div id="loadScr" style="display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:14px">
  <div style="font-size:32px">📊</div>
  <div style="font-size:16px;font-weight:600;color:#1F3864">OKYC MBO 2026</div>
  <div id="loadMsg" style="font-size:13px;color:#6c757d">구글 시트에서 데이터를 불러오는 중…</div>
  <div style="font-size:11px;color:#9ca3af">잠시만 기다려 주세요</div>
</div>

<div class="toast hidden" id="toast"></div>

/* 신규 필드 보강: 근거파일(분기별 파일 배열)/월별 필드 생성 */
function ensureFields(data){
  data.forEach(t=>t.지표.forEach(ind=>{
    // 근거파일: 분기별 파일 메타 배열 {name, fileId, url, size}
    if(!ind.근거파일||typeof ind.근거파일!=='object'||Array.isArray(ind.근거파일)){
      ind.근거파일={Q1:[],Q2:[],Q3:[],Q4:[]};
    }else{
      QS.forEach(q=>{if(!Array.isArray(ind.근거파일[q]))ind.근거파일[q]=[];});
    }
    delete ind.근거;     // 구버전 텍스트 필드 제거
    delete ind.근거자료; // 더 오래된 배열 필드 제거
    if(!ind.월별||typeof ind.월별!=='object'){
      ind.월별={};for(let m=1;m<=12;m++)ind.월별['M'+m]='';
    }else{
      for(let m=1;m<=12;m++)if(ind.월별['M'+m]===undefined)ind.월별['M'+m]='';
    }
  }));
  return data;
}

function teamScore(t){
  const a=[];t.지표.forEach(ind=>{const qs=Object.values(ind.분기).filter(q=>q.점수!==null);if(qs.length){const avg=qs.reduce((s,q)=>s+q.점수,0)/qs.length;a.push({s:avg,w:ind.가중});}});
  if(!a.length)return null;const tw=a.reduce((s,x)=>s+x.w,0);
  return Math.round(a.reduce((s,x)=>s+x.s*x.w,0)/tw*10)/10;
}
function typeScore(t,type){
  const a=[];t.지표.filter(i=>i.유형===type).forEach(ind=>{const qs=Object.values(ind.분기).filter(q=>q.점수!==null);if(qs.length){const avg=qs.reduce((s,q)=>s+q.점수,0)/qs.length;a.push({s:avg,w:ind.가중});}});
  if(!a.length)return null;const tw=a.reduce((s,x)=>s+x.w,0);
  return Math.round(a.reduce((s,x)=>s+x.s*x.w,0)/tw*10)/10;
}
function indAvg(ind){const qs=Object.values(ind.분기).filter(q=>q.점수!==null);if(!qs.length)return null;return Math.round(qs.reduce((s,q)=>s+q.점수,0)/qs.length*10)/10;}
function qTeamScore(t,q){
  const inds=t.지표.filter(i=>i.분기[q].점수!==null);if(!inds.length)return null;

}

/* 저장된 데이터를 현재 DATA에 병합 적용 */
function applyData(parsed){
  if(!(parsed&&Array.isArray(parsed)&&parsed.length===TEAMS_INIT.length))return false;
  parsed.forEach((pt,i)=>{if(!DATA[i])return;pt.지표&&pt.지표.forEach((pi,j)=>{
    if(DATA[i].지표[j]){
      DATA[i].지표[j].분기=pi.분기||DATA[i].지표[j].분기;
      if(pi.근거파일&&typeof pi.근거파일==='object'&&!Array.isArray(pi.근거파일))DATA[i].지표[j].근거파일=pi.근거파일;
      if(pi.월별&&typeof pi.월별==='object')DATA[i].지표[j].월별=pi.월별;
    }
  });});
  ensureFields(DATA);
  return true;
}

function setSyncStatus(state){
  /* state: 'syncing' | 'ok' | 'local' | 'error' */
  const tx=T();

  const col={syncing:'#F59E0B',ok:'#1B873F',local:'#6B7280',error:'#DC2626'};

  const dot=document.getElementById('syncDot');
  const ct=document.getElementById('syncChipText');
  if(dot)dot.style.background=col[state]||'#6B7280';
  if(ct)ct.textContent=txt[state]||tx.syncIdle;
  if(chip){
    chip.classList.toggle('syncing',state==='syncing');
    /* 저장 완료 후 잠시 뒤 시각 갱신 */
    if(state==='ok'){
      const tm=chip.querySelector('.sync-time');
      if(tm)tm.textContent=tx.lastSaved+': '+(STORAGE.time()||tx.noData);
      setTimeout(()=>{if(ct)ct.textContent=tx.syncIdle;},2500);
    }
  }
  /* 헤더 배지 (간단 표시) */
  const b=document.getElementById('savedBadge');
  if(b){
    const bmap={syncing:'⟳',ok:'✓',local:'📴',error:'⚠'};
    b.textContent=bmap[state]||'';
    b.style.background=col[state]||'#6B7280';
    b.style.display=(state==='syncing')?'inline':'none';
  }
}

/* 스토리지 어댑터 — Google Sheets 양방향 연동 */
const STORAGE={
  /* 저장: localStorage 캐시 → Google Sheets 비동기 전송 */
  async save(payload){
    const body=JSON.stringify(payload);
    /* 1. 즉시 로컬 캐시 저장 (오프라인 대비) */
    localStorage.setItem(SK,body);
    localStorage.setItem(SK+'_lang',LANG);
    const ts=new Date().toLocaleString(LANG==='ko'?'ko-KR':'en-US');
    localStorage.setItem(SK+'_time',ts);
    /* 2. 구글 시트에 비동기 전송 */
    setSyncStatus('syncing');
    try{
      await fetch(SCRIPT_URL,{
        method:'POST',
        mode:'no-cors',      /* Apps Script는 no-cors 필요 */
        headers:{'Content-Type':'text/plain'},
        body:body
      });
      setSyncStatus('ok');
      return true;
    }catch(e){
      /* 네트워크 오류 시 로컬 저장만 유지 */
      setSyncStatus('local');
      return false;
    }
  },
  /* 로드: Google Sheets 우선, 실패 시 localStorage 폴백 */
  async load(){
    try{
      const res=await fetch(SCRIPT_URL+'?t='+Date.now()); /* 캐시 방지 */
      const text=await res.text();
      if(text&&text!=='null'&&text!==''){
        const parsed=JSON.parse(text);
        /* 구글에서 불러온 데이터를 로컬 캐시에도 저장 */
        localStorage.setItem(SK,JSON.stringify(parsed));
        return parsed;
      }
    }catch(e){/* 구글 연결 실패 → 로컬 폴백 */}
    const raw=localStorage.getItem(SK);
    return raw?JSON.parse(raw):null;
  },
  lang(){return localStorage.getItem(SK+'_lang');},
  time(){return localStorage.getItem(SK+'_time');},
};

/* saveLocal: 비동기 저장 (async) */
async function saveLocal(){
  try{return await STORAGE.save(serializeData());}catch(e){return false;}
}

/* loadLocal: 비동기 로드 (async) */
async function loadLocal(){
  try{
    const sl=STORAGE.lang();
    if(sl&&(sl==='ko'||sl==='en'))LANG=sl;
    const parsed=await STORAGE.load();
    if(!parsed)return false;
    return applyData(parsed);
  }catch(e){}return false;
}

/* ═══ Chart.js 기준선 플러그인 ═══ */
Chart.register({id:'lines',beforeDraw(ch){
  const a=ch.options._lines;if(!a)return;
  const ctx=ch.ctx,{top,bottom,left,right}=ch.chartArea,xs=ch.scales.x,ys=ch.scales.y;
  a.forEach(x=>{ctx.save();ctx.strokeStyle=x.c||'#ccc';ctx.lineWidth=1.5;ctx.setLineDash([5,4]);ctx.beginPath();
    if(x.ax==='x'){const px=xs.getPixelForValue(x.v);ctx.moveTo(px,top);ctx.lineTo(px,bottom);}
    else{const py=ys.getPixelForValue(x.v);ctx.moveTo(left,py);ctx.lineTo(right,py);}
    ctx.stroke();ctx.restore();});
}});

/* ═══ 근거자료 / 월별 블록 ═══ */
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function fmtSize(bytes){
  if(!bytes||bytes<0)return'';
  if(bytes<1024)return bytes+' B';
  if(bytes<1024*1024)return(bytes/1024).toFixed(0)+' KB';
  return(bytes/1024/1024).toFixed(1)+' MB';
}
function fileIcon(name){
  const n=(name||'').toLowerCase();
  if(n.endsWith('.pdf'))return'📕';
  if(n.endsWith('.xlsx')||n.endsWith('.xls')||n.endsWith('.csv'))return'📊';
  if(n.endsWith('.doc')||n.endsWith('.docx'))return'📄';
  if(n.endsWith('.ppt')||n.endsWith('.pptx'))return'📑';
  if(/\.(png|jpg|jpeg|gif|webp)$/.test(n))return'🖼️';
  return'📎';
}

        oninput="onMonChange(${idx},${iIdx},${m+1})">
    </div>`;
  }).join('')+`</div><div style="font-size:10px;color:var(--text-hint);margin-top:8px">※ ${tx.monHint}</div>`:'';
  return`<div class="subsec" id="mon-sub-${idx}-${iIdx}">
    <div class="subhead">📅 ${tx.monToggle}
      <button class="mon-toggle-btn${open?' on':''}" onclick="toggleMon(${idx},${iIdx})">${open?'▲':'▼'}</button>
      <span style="font-weight:400;color:var(--text-hint);font-size:10px">(${ind.단위})</span>
    </div>
    <div id="mon-body-${idx}-${iIdx}">${cells}</div>
  </div>`;
}

/* 자동저장 디바운스 — 입력값을 화면에서 지우지 않음 */
function scheduleSave(){
  if(AUTO_TIMER)clearTimeout(AUTO_TIMER);
  AUTO_TIMER=setTimeout(async()=>{
    await saveLocal();
  },1500);
}

/* 분기별 근거파일 업로드 — 구글 드라이브로 전송 */
const EVID_MAX=30*1024*1024; // 30MB 권장 상한
async function uploadEvidFile(idx,iIdx,q,input){
  const file=input.files&&input.files[0];
  if(!file){return;}
  const tx=T();
  if(file.size>EVID_MAX){
    showToast(tx.evidTooBig,false);input.value='';return;
  }
  const addBtn=document.getElementById(`ef-add-${idx}-${iIdx}-${q}`);
  if(addBtn){addBtn.classList.add('uploading');addBtn.querySelector('span').textContent=tx.evidUploading;}
  try{
    const dataUrl=await new Promise((res,rej)=>{
      const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsDataURL(file);
    });
    const base64=String(dataUrl).split(',')[1]||'';
    const teamName=DATA[idx].ko;
    const indName=DATA[idx].지표[iIdx].ko;
    const res=await fetch(SCRIPT_URL,{
      method:'POST',
      headers:{'Content-Type':'text/plain'},
      body:JSON.stringify({action:'upload',team:teamName,indicator:indName,quarter:q,filename:file.name,mimeType:file.type||'application/octet-stream',data:base64})
    });
    const json=await res.json();
    if(json&&json.status==='ok'&&json.url){
      DATA[idx].지표[iIdx].근거파일[q].push({name:file.name,fileId:json.fileId||'',url:json.url,size:file.size});
      refreshEvidList(idx,iIdx,q);
      await saveLocal();
      showToast(tx.evidUploadOk,true);
    }else{
      showToast((json&&json.message)||tx.evidUploadFail,false);
    }
  }catch(e){
    showToast(tx.evidUploadFail,false);
  }finally{
    if(addBtn){addBtn.classList.remove('uploading');addBtn.querySelector('span').textContent=tx.evidAdd;}
    input.value='';
  }
}

function delEvidFile(idx,iIdx,q,k){
  const tx=T();
  if(!confirm(tx.evidDelConfirm))return;
  DATA[idx].지표[iIdx].근거파일[q].splice(k,1);
  refreshEvidList(idx,iIdx,q);
  saveLocal();
}

/* 해당 분기 파일 목록만 다시 그림 (전체 재렌더 없이 — 다른 입력칸 값 보존) */
function refreshEvidList(idx,iIdx,q){
  const cont=document.getElementById(`ef-list-${idx}-${iIdx}-${q}`);
  if(!cont)return;
  const tx=T();
  const files=(DATA[idx].지표[iIdx].근거파일&&DATA[idx].지표[iIdx].근거파일[q])||[];
  cont.innerHTML=files.length?files.map((f,k)=>`
    <div class="efile">
      <span class="efile-ic">${fileIcon(f.name)}</span>
      <a class="efile-nm" href="${esc(f.url||'#')}" target="_blank" rel="noopener" title="${esc(f.name)}">${esc(f.name)}</a>
      <span class="efile-sz">${fmtSize(f.size)}</span>
      <button class="efile-del" onclick="delEvidFile(${idx},${iIdx},'${q}',${k})" title="${tx.evidDel}">×</button>
    </div>`).join(''):`<div class="efile-empty">${tx.evidEmpty}</div>`;
}

/* 월별 토글: 전체 재렌더 대신 해당 블록만 교체 (다른 입력칸 값 보존) */
function toggleMon(idx,iIdx){
  const ind=DATA[idx].지표[iIdx];
  ind._monOpen=!ind._monOpen;
  const sub=document.getElementById(`mon-sub-${idx}-${iIdx}`);
  if(sub){
    const wrap=document.createElement('div');
    wrap.innerHTML=monthlyBlock(idx,iIdx,ind);
    sub.replaceWith(wrap.firstElementChild);
  }
}

function onMonChange(idx,iIdx,m){
  const inp=(typeof event!=='undefined'&&event&&event.target)?event.target:null;
  DATA[idx].지표[iIdx].월별['M'+m]=inp?inp.value:'';
  scheduleSave();
}

/* ═══ 팀별 입력 렌더링 ═══ */
function renderInp(idx){
  const t=DATA[idx];const tx=T();
  const ws=teamScore(t),fs=typeScore(t,'fin'),ms=typeScore(t,'key');
  const g=grade(ws),gc=GC[g]?.c||'#888';
  const oc=OC[t.사무소];

  let html=`
  <div class="preview-bar" id="pvBar-${idx}">
    <div class="pv-item"><div class="pv-val" style="color:${sc(fs)}" id="pv-fs-${idx}">${fs!==null?fs:tx.noData}</div><div class="pv-lbl">${tx.pvFin}</div></div>
    <div class="sep"></div>
    <div class="pv-item"><div class="pv-val" style="color:${sc(ms)}" id="pv-ms-${idx}">${ms!==null?ms:tx.noData}</div><div class="pv-lbl">${tx.pvKey}</div></div>
    <div class="sep"></div>
    <div class="pv-item"><div class="pv-val" style="color:${gc}" id="pv-ws-${idx}">${ws!==null?ws:tx.noData}</div><div class="pv-lbl">${tx.pvWt}</div></div>
    <div class="sep"></div>
    <div class="pv-item" id="pv-grade-${idx}">${ws!==null?gb(g,'glg'):`<span style="color:var(--text-secondary);font-size:13px">${tx.notInput}</span>`}</div>
    <div style="margin-left:auto;font-size:11px;color:var(--text-secondary);text-align:right">${tx.pvNote}</div>
  </div>
  <div class="card">
    <div class="ct">
      <span class="otag" style="background:${oc}22;color:${oc}">${toff(t.사무소)}</span>
      <strong>${tname(t)}</strong> · ${tx.inputTitle}
    </div>`;

  t.지표.forEach((ind,iIdx)=>{
    const bc=ind.유형==='fin'?'#FFC000':'#2E75B6';
    const tbg=ind.유형==='fin'?'#FFF8E1':'#EFF6FF';
    const tc=ind.유형==='fin'?'#92400E':'#1E40AF';
    const avg=indAvg(ind);

    html+=`<div class="icard" style="border-left:3px solid ${bc}">
      <div class="ihead">
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
          <span class="utag" style="background:${tbg};color:${tc}">${ttype(ind.유형)}</span>
          <span class="iname">${tind(ind)}</span>
          <span style="font-size:11px;color:var(--text-secondary)">${tx.wtLabel} ${ind.가중}% · ${tx.targetLabel}: ${ind.목표}</span>
        </div>
        <div id="ind-avg-${idx}-${iIdx}">${avg!==null?`<span class="spill" style="background:${sc(avg)}">${avg}${tx.avgLabel}</span>`:`<span style="font-size:11px;color:var(--text-secondary)">${tx.notInput}</span>`}</div>
      </div>
      <div class="qrow">`;

    QS.forEach(q=>{
      const qd=ind.분기[q];const s=qd.점수;
      html+=`<div class="qcard" id="qc-${idx}-${iIdx}-${q}" style="${s!==null?`border-color:${sc(s)}`:''}">
        <div class="qlbl">${q} <span class="qperiod">${tx.qPeriods[q]}</span></div>
        <input class="qinp" type="text" placeholder="${tx.realPlaceholder} (${ind.단위})"
          value="${qd.실적||''}" id="ri-${idx}-${iIdx}-${q}"
          oninput="onChange(${idx},${iIdx},'${q}')">
        <select class="qsel" id="si-${idx}-${iIdx}-${q}" onchange="onChange(${idx},${iIdx},'${q}')">
          <option value="">${tx.scoreSelect}</option>
          ${tx.scoreOpts.map(o=>`<option value="${o.v}" ${s===o.v?'selected':''}>${o.l}</option>`).join('')}
        </select>
        <input class="qinp" type="text" placeholder="${tx.notePlaceholder}"
          style="margin-top:6px;font-size:11px;margin-bottom:0"
          value="${qd.비고||''}" id="ni-${idx}-${iIdx}-${q}"
          oninput="onChange(${idx},${iIdx},'${q}')">
        <div class="qscore-val" id="qsv-${idx}-${iIdx}-${q}" style="color:${s!==null?sc(s):'var(--text-hint)'}">${s!==null?s+tx.pointSuffix:tx.noData}</div>
      </div>`;
    });

    html+=`</div>
      <div class="qscore-row">
        ${QS.map(q=>{const s=ind.분기[q].점수;return`<div class="qscore-cell">
          <div class="qs-lbl">${q} ${tx.qPeriods[q]}</div>
          <div class="qs-val" id="qs-${idx}-${iIdx}-${q}" style="color:${s!==null?sc(s):'var(--text-hint)'}">${s!==null?s+tx.pointSuffix:tx.noData}</div>
        </div>`;}).join('')}
      </div>
      ${evidenceBlock(idx,iIdx,ind)}
      ${monthlyBlock(idx,iIdx,ind)}
    </div>`;
  });

  html+=`
    <div style="display:flex;align-items:center;gap:14px;margin-top:16px;flex-wrap:wrap">
      <button class="save-btn" onclick="doSave(${idx})" id="saveBtn-${idx}">${tx.saveBtn}</button>
      <span style="font-size:12px;color:var(--text-secondary)">${tx.saveNote}</span>
    </div>
  </div>`;

  document.getElementById('tab-input').innerHTML=html;
}

function onChange(tIdx,iIdx,q){
  const ri=document.getElementById(`ri-${tIdx}-${iIdx}-${q}`);
  const si=document.getElementById(`si-${tIdx}-${iIdx}-${q}`);
  const ni=document.getElementById(`ni-${tIdx}-${iIdx}-${q}`);
  if(ri)DATA[tIdx].지표[iIdx].분기[q].실적=ri.value;
  const v=si?si.value:'';DATA[tIdx].지표[iIdx].분기[q].점수=v?parseInt(v):null;
  if(ni)DATA[tIdx].지표[iIdx].분기[q].비고=ni.value;
  const s=DATA[tIdx].지표[iIdx].분기[q].점수;
  const tx=T();
  const card=document.getElementById(`qc-${tIdx}-${iIdx}-${q}`);
  if(card)card.style.borderColor=s!==null?sc(s):'var(--border)';
  const qsv=document.getElementById(`qsv-${tIdx}-${iIdx}-${q}`);
  if(qsv){qsv.textContent=s!==null?s+tx.pointSuffix:tx.noData;qsv.style.color=s!==null?sc(s):'var(--text-hint)';}
  const qsEl=document.getElementById(`qs-${tIdx}-${iIdx}-${q}`);
  if(qsEl){qsEl.textContent=s!==null?s+tx.pointSuffix:tx.noData;qsEl.style.color=s!==null?sc(s):'var(--text-hint)';}
  const avg=indAvg(DATA[tIdx].지표[iIdx]);
  const avgEl=document.getElementById(`ind-avg-${tIdx}-${iIdx}`);
  if(avgEl)avgEl.innerHTML=avg!==null?`<span class="spill" style="background:${sc(avg)}">${avg}${tx.avgLabel}</span>`:`<span style="font-size:11px;color:var(--text-secondary)">${tx.notInput}</span>`;
  updatePreview(tIdx);
  scheduleSave();
}

function updatePreview(tIdx){
  const t=DATA[tIdx];const tx=T();
  const ws=teamScore(t),fs=typeScore(t,'fin'),ms=typeScore(t,'key');
  const g=grade(ws),gc=GC[g]?.c||'#888';
  const fe=document.getElementById(`pv-fs-${tIdx}`);if(fe){fe.textContent=fs!==null?fs:tx.noData;fe.style.color=sc(fs);}
  const me=document.getElementById(`pv-ms-${tIdx}`);if(me){me.textContent=ms!==null?ms:tx.noData;me.style.color=sc(ms);}
  const we=document.getElementById(`pv-ws-${tIdx}`);if(we){we.textContent=ws!==null?ws:tx.noData;we.style.color=gc;}
  const ge=document.getElementById(`pv-grade-${tIdx}`);if(ge)ge.innerHTML=ws!==null?gb(g,'glg'):`<span style="color:var(--text-secondary);font-size:13px">${tx.notInput}</span>`;
}

async function doSave(idx){
  const btn=document.getElementById('saveBtn-'+idx);const tx=T();
  if(btn){btn.disabled=true;btn.textContent=tx.saving;}
  setSyncStatus('syncing');
  const ok=await saveLocal();
  if(btn){btn.disabled=false;btn.textContent=ok?tx.saveOk:tx.saveFail;btn.style.background=ok?'#1B873F':'#DC2626';
    setTimeout(()=>{btn.textContent=tx.saveBtn;btn.style.background='var(--navy)';},2500);}
  showToast(ok?tx.toastOk:tx.toastFail,ok);
}

/* ═══ 초기화 ═══ */
async function init(){
  /* 로딩 화면 표시 */
  const loadScr=document.getElementById('loadScr');
  const loadMsg=document.getElementById('loadMsg');
  if(loadMsg)loadMsg.textContent='구글 시트에서 데이터를 불러오는 중…';
  await loadLocal();
  if(loadScr)loadScr.style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('btnKO').classList.toggle('on',LANG==='ko');
  document.getElementById('btnEN').classList.toggle('on',LANG==='en');
  document.getElementById('hdrTitle').textContent=T().sysTitle;
  document.getElementById('hdrSub').textContent=T().sysSubtitle;
  document.getElementById('hdrBadge').textContent=T().yearBadge;
  const sl=document.getElementById('hdrSaveLbl');if(sl)sl.textContent=T().hdrSave;
  buildTabs();showOv();
}
init();
</script>
